services:
  - type: web
    name: annex-api
    runtime: python
    buildCommand: |
      pip install -r requirements.txt
      playwright install chromium
      playwright install-deps chromium
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: ALLOWED_ORIGIN
        sync: false
